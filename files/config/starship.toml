add_newline = false

[username]
style_user = "Orange"
show_always = true
format = '[$user](bold #FF8F00)'

[hostname]
ssh_only = false
format = '[@](#FF8F00)[$hostname > ](bold #FF8F00)'
disabled = false

[directory]
truncation_length = 3
truncation_symbol = "έΑο/"
style = "bold FF8F00"
disabled = false
read_only = " ≤░Ν╛"

[directory.substitutions]
"Programming" = " ΎΤ░  Programming"
"Downloads" = " ΎΑβ  Downloads"
"Documents" = " ≤░Ιβ Documents"
"Backups" = " ≤░ΣΥ Backups"
"Images" = " ΎΑ╛  Images"
"Videos" = " ΎΑ╜  Videos"
"Music" = " ≤░ζγ  Music"
"Tools" = " ΌΙΠ  Tools"

